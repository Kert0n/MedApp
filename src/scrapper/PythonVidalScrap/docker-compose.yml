services:
  # PostgreSQL база данных
  postgres:
    image: postgres:16-alpine
    container_name: vidal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vidal
      POSTGRES_USER: vidal
      POSTGRES_PASSWORD: vidal
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    ports:
      - "5432:5432"  # Для доступа извне (можно убрать для безопасности)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidal -d vidal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vidal-network

  # Основной скраппер
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vidal-scraper
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # База данных
      DATABASE_URL: postgresql://vidal:vidal@postgres:5432/vidal
      # Настройки парсинга
      MIN_DELAY: "0.5"
      MAX_DELAY: "3.0"
      MAX_RETRIES: "5"
      # Пути
      DATA_DIR: /data
      # Python unbuffered для логов в реальном времени
      PYTHONUNBUFFERED: "1"
    volumes:
      - scraper_data:/data  # Named volume для данных скраппера
    networks:
      - vidal-network
    # По умолчанию запускаем скраппер
    command: ["scrape"]
    # Healthcheck для скраппера
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Логи
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
    name: vidal-postgres-data
  scraper_data:
    name: vidal-scraper-data

networks:
  vidal-network:
    name: vidal-network
