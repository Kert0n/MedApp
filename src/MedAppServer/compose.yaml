services:
  postgres:
    image: 'postgres:15-alpine'
    environment:
      - 'POSTGRES_DB=medapp'
      - 'POSTGRES_USER=medapp'
      - 'POSTGRES_PASSWORD=changeme'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  medapp-server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:postgresql://postgres:5432/medapp
      - DATABASE_USERNAME=medapp
      - DATABASE_PASSWORD=changeme
      - REGISTRATION_SECRET=${REGISTRATION_SECRET:-defaultSecretChangeMe}
      - AUTH_TERM=10
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
