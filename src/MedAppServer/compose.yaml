services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=medapp-server-db'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d medapp-server-db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medapp-network
  
