spring.application.name=MedAppServer-Test
rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem
registration.secret=test-secret
authentication.termInMinutes=60
registration.timeout.InSeconds=30
registration.timeout.BanNumber=1
medkit.share.termInMinutes=525600

# H2 Test Database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Logging
logging.level.root=WARN
logging.level.org.kert0n.medappserver=DEBUG
logging.level.org.springframework.test=INFO
