# Production configuration
spring.application.name=MedAppServer

# Database Configuration - Override with environment variables
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/medapp}
spring.datasource.username=${DATABASE_USERNAME:medapp}
spring.datasource.password=${DATABASE_PASSWORD:changeme}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# RSA Keys
rsa.private-key=${RSA_PRIVATE_KEY:classpath:certs/private.pem}
rsa.public-key=${RSA_PUBLIC_KEY:classpath:certs/public.pem}

# Registration secret - MUST be overridden in production
registration.secret=${REGISTRATION_SECRET}

# Authentication term (days)
authentication.term=${AUTH_TERM:10}

# Logging - Console only (privacy-by-design)
logging.level.root=INFO
logging.level.org.kert0n.medappserver=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
