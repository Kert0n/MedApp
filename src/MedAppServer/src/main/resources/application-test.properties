# Application configuration for testing with H2 database
spring.application.name=MedAppServer

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# RSA Keys for testing
rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem

# Registration secret
registration.secret=W*hk9NqhxxLhPHF4K89Lj^F3F6aCueqxa@Rm!iq&nKuUHDrHjzuUdcW@%PG8oxAp

# Authentication term (days)
authentication.term=10

# Logging
logging.level.root=INFO
logging.level.org.kert0n.medappserver=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
