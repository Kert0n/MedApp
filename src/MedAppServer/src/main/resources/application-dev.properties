spring.application.name=MedAppServer
rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem
registration.secret=123
authentication.termInMinutes=525600
registration.timeout.InSeconds=30
registration.timeout.BanNumber=1
medkit.share.termInMinutes=525600
springdoc.swagger-ui.path=/swagger

spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# Logging Configuration (console-only for privacy-by-design)
logging.level.root=INFO
logging.level.org.kert0n.medappserver=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

spring.datasource.url=jdbc:postgresql://localhost:5432/medapp-server-db
spring.datasource.username=myuser
spring.datasource.password=secret