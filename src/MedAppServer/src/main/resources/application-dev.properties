spring.application.name=MedAppServer
rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem
registration.secret=123
authentication.termInMinutes=525600
registration.timeout.InSeconds=36000
registration.timeout.BanNumber=10
medkit.share.termInMinutes=525600
spring.jpa.open-in-view=false
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
# Logging Configuration (console-only for privacy-by-design)
logging.level.root=INFO
logging.level.org.kert0n.medappserver=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
spring.datasource.url=jdbc:postgresql://localhost:5432/medapp-server-db
spring.datasource.username=myuser
spring.datasource.password=secret
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false