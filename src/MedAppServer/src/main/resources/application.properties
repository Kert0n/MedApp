rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem
registration.secret=W*hk9NqhxxLhPHF4K89Lj^F3F6aCueqxa@Rm!iq&nKuUHDrHjzuUdcW@%PG8oxAp
registration.timeout.InSeconds=300
registration.timeout.BanNumber=3
medkit.share.termInMinutes=15
authentication.termInMinutes=10
spring.jpa.open-in-view=false

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/medapp-server-db
spring.datasource.username=myuser
spring.datasource.password=secret
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Logging Configuration (console-only for privacy-by-design)
logging.level.root=INFO
logging.level.org.kert0n.medappserver=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Server Configuration
server.port=8080
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
