        "operationId": "getDrugQuantityInfo",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Drug ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Quantity info retrieved",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/QuantityInfo"
                }
              }
            }
          },
          "404": {
            "description": "Drug not found"
          }
        }
      }
    },
    "/auth/login": {
      "get": {
        "tags": [
          "Authentication"
        ],
        "summary": "Issue JWT token",
        "description": "Uses HTTP Basic authentication and returns a JWT access token.",
        "operationId": "login",
        "responses": {
          "200": {
            "description": "JWT token issued",
            "content": {
              "*/*": {
                "schema": {
                  "type": "string"
                }
              }
            }
          },
          "401": {
            "description": "Invalid credentials"
          }
        }
      }
    },
    "/med-kit/{id}/leave": {
      "delete": {
        "tags": [
          "MedKit Management"
        ],
        "summary": "Leave medkit",
        "description": "Removes the authenticated user from the medkit",
        "operationId": "leaveMedKit",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Medkit ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "204": {
            "description": "User removed from medkit"
          },
          "404": {
            "description": "Medkit not found"
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "UsingUpdateDTO": {
        "type": "object",
        "description": "Update treatment plan request",
        "properties": {
          "plannedAmount": {
            "type": "number",
            "format": "double",
            "description": "Planned amount",
            "example": 20,
            "minimum": 0
          }
        },
        "required": [
          "plannedAmount"
        ]
      },
      "UsingDTO": {
        "type": "object",
        "description": "Treatment plan information",
        "properties": {
          "userId": {
            "type": "string",
            "format": "uuid",
            "description": "User identifier"
          },
          "drugId": {
            "type": "string",
            "format": "uuid",
            "description": "Drug identifier"
          },
          "plannedAmount": {
            "type": "number",
            "format": "double",
            "description": "Planned total amount for the course"
          },
          "createdAt": {
            "type": "string",
            "format": "date-time",
            "description": "Date when the plan was created"
          },
          "lastModified": {
            "type": "string",
            "format": "date-time",
            "description": "Date of last modification"
          }
        }
      },
      "DrugUpdateDTO": {
        "type": "object",
        "description": "Request to update a drug",
        "properties": {
          "name": {
            "type": "string",
            "description": "Drug name",
            "example": "Aspirin",
            "maxLength": 300,
            "minLength": 1
          },
          "quantity": {
            "type": "number",
            "format": "double",
            "description": "Quantity",
            "example": 100,
            "minimum": 0
          },
          "quantityUnit": {
            "type": "string",
            "description": "Quantity unit",
            "example": "mg",
            "maxLength": 50,
            "minLength": 1
          },
          "formType": {
            "type": "string",
            "description": "Form type",
            "example": "tablet",
            "maxLength": 100,
            "minLength": 0
          },
          "category": {
            "type": "string",
            "description": "Category",
            "example": "painkiller",
            "maxLength": 200,
            "minLength": 0
          },
          "manufacturer": {
            "type": "string",
            "description": "Manufacturer",
            "example": "Bayer",
            "maxLength": 300,
            "minLength": 0
          },
          "country": {
            "type": "string",
            "description": "Country",
