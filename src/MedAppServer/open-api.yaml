{
  "openapi": "3.1.0",
  "info": {
    "title": "MedApp Server API",
    "description": "REST API for MedApp medicine kit synchronization and catalog search.",
    "version": "0.0.1"
  },
  "servers": [
    {
      "url": "http://localhost:8080",
      "description": "Generated server url"
    }
  ],
  "security": [
    {
      "Bearer Authentication": []
    }
  ],
  "tags": [
    {
      "name": "Drug Management",
      "description": "APIs for managing drugs in medicine kits"
    },
    {
      "name": "MedKit Management",
      "description": "APIs for managing medicine kits"
    },
    {
      "name": "User Data",
      "description": "Endpoints for user profile and synchronization data"
    },
    {
      "name": "Authentication",
      "description": "Public endpoints for registration and token issuance"
    },
    {
      "name": "Treatment Plans",
      "description": "Endpoints for treatment plans and intake tracking"
    }
  ],
  "paths": {
    "/using/drug/{drugId}": {
      "get": {
        "tags": [
          "Treatment Plans"
        ],
        "summary": "Get treatment plan by drug",
        "description": "Returns a treatment plan for a specific drug.",
        "operationId": "getSpecificUsing",
        "parameters": [
          {
            "name": "drugId",
            "in": "path",
            "description": "Drug ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Treatment plan retrieved",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/UsingDTO"
                }
              }
            }
          },
          "404": {
            "description": "Treatment plan not found"
          }
        }
      },
      "put": {
        "tags": [
          "Treatment Plans"
        ],
        "summary": "Update treatment plan",
        "description": "Updates the planned amount for a drug.",
        "operationId": "updateUsing",
        "parameters": [
          {
            "name": "drugId",
            "in": "path",
            "description": "Drug ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "requestBody": {
          "description": "Updated treatment plan",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/UsingUpdateDTO"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Treatment plan updated",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/UsingDTO"
                }
              }
            }
          },
          "400": {
            "description": "Invalid input"
          },
          "404": {
            "description": "Treatment plan not found"
          }
        }
      },
      "delete": {
        "tags": [
          "Treatment Plans"
        ],
        "summary": "Delete treatment plan",
        "description": "Deletes a planned usage for a drug.",
        "operationId": "deleteTreatmentPlan",
        "parameters": [
          {
            "name": "drugId",
            "in": "path",
            "description": "Drug ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "204": {
            "description": "Treatment plan deleted"
          },
          "404": {
            "description": "Treatment plan not found"
          }
        }
      }
    },
    "/drug/{id}": {
      "get": {
        "tags": [
          "Drug Management"
        ],
        "summary": "Get drug by ID",
        "description": "Retrieves a drug by its ID if the user has access",
        "operationId": "getDrug",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Drug ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Drug found",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/DrugDTO"
                }
              }
            }
          },
          "404": {
            "description": "Drug not found or access denied"
          }
        }
      },
      "put": {
        "tags": [
          "Drug Management"
        ],
        "summary": "Update a drug",
        "description": "Updates an existing drug",
        "operationId": "updateDrug",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Drug ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "requestBody": {
          "description": "Drug update details",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/DrugUpdateDTO"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Drug updated successfully",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/DrugDTO"
                }
              }
            }
          },
          "400": {
            "description": "Invalid input"
          },
          "404": {
            "description": "Drug not found"
          }
        }
      },
      "delete": {
        "tags": [
          "Drug Management"
        ],
        "summary": "Delete a drug",
        "description": "Deletes a drug from the medicine kit",
        "operationId": "deleteDrug",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Drug ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "204": {
            "description": "Drug deleted successfully"
          },
          "404": {
            "description": "Drug not found"
          }
        }
      }
    },
    "/drug/move/{id}": {
      "put": {
        "tags": [
          "Drug Management"
        ],
        "summary": "Move drug to another medicine kit",
        "description": "Transfers a drug between medicine kits",
        "operationId": "moveDrug",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Drug ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "requestBody": {
          "description": "Target medicine kit",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/MoveDrugRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Drug moved",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/DrugDTO"
                }
              }
            }
          },
          "400": {
            "description": "Invalid target medkit"
          },
          "404": {
            "description": "Drug or medkit not found"
          }
        }
      }
    },
    "/drug/consume/{id}": {
      "put": {
        "tags": [
          "Drug Management"
        ],
        "summary": "Consume drug",
        "description": "Reduces drug quantity by the consumed amount",
        "operationId": "consumeDrug",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Drug ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "requestBody": {
          "description": "Consumption details",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ConsumeRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Drug consumed",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/DrugDTO"
                }
              }
            }
          },
          "400": {
            "description": "Invalid quantity"
          },
          "404": {
            "description": "Drug not found"
          }
        }
      }
    },
    "/using": {
      "get": {
        "tags": [
          "Treatment Plans"
        ],
        "summary": "Get all treatment plans",
        "description": "Returns all planned drug usages for the user.",
        "operationId": "getUsings",
        "responses": {
          "200": {
            "description": "Treatment plans retrieved",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/UsingDTO"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized"
          }
        }
      },
      "post": {
        "tags": [
          "Treatment Plans"
        ],
        "summary": "Create treatment plan",
        "description": "Creates a planned usage for a drug.",
        "operationId": "createUsing",
        "requestBody": {
          "description": "Treatment plan details",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/UsingCreateDTO"
              }
            }
          },
          "required": true
        },
        "responses": {
          "201": {
            "description": "Treatment plan created",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/UsingDTO"
                }
              }
            }
          },
          "400": {
            "description": "Invalid input"
          },
          "409": {
            "description": "Treatment plan already exists"
          }
        }
      }
    },
    "/using/drug/{drugId}/intake": {
      "post": {
        "tags": [
          "Treatment Plans"
        ],
        "summary": "Record intake",
        "description": "Registers a drug intake and updates the planned amount.",
        "operationId": "recordRegularUsing",
        "parameters": [
          {
            "name": "drugId",
            "in": "path",
            "description": "Drug ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "requestBody": {
          "description": "Intake details",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/IntakeRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Intake recorded",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/UsingDTO"
                }
              }
            }
          },
          "400": {
            "description": "Invalid intake amount"
          },
          "404": {
            "description": "Treatment plan not found"
          }
        }
      }
    },
    "/med-kit": {
      "get": {
        "tags": [
          "MedKit Management"
        ],
        "summary": "Get all medkits",
        "description": "Returns summary info for all medkits accessible to the user",
        "operationId": "getAllMedKits",
        "responses": {
          "200": {
            "description": "Medkits retrieved",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/MedKitSummaryDTO"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized"
          }
        }
      },
      "post": {
        "tags": [
          "MedKit Management"
        ],
        "summary": "Create a new medkit",
        "description": "Creates a new medkit for the authenticated user",
        "operationId": "createNew",
        "responses": {
          "201": {
            "description": "Medkit created successfully",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/MedKitCreatedResponse"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized"
          }
        }
      }
    },
    "/med-kit/{medKitId}/share": {
      "post": {
        "tags": [
          "MedKit Management"
        ],
        "summary": "Generate share key",
        "description": "Generates a one-time share key for a medkit",
        "operationId": "generateKeyToMedKit",
        "parameters": [
          {
            "name": "medKitId",
            "in": "path",
            "description": "Medkit ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "requestBody": {
          "description": "Share request",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AddUserRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Share key generated",
            "content": {
              "*/*": {
                "schema": {
                  "type": "string"
                }
              }
            }
          },
          "404": {
            "description": "Medkit not found or access denied"
          }
        }
      }
    },
    "/med-kit/join": {
      "post": {
        "tags": [
          "MedKit Management"
        ],
        "summary": "Join medkit by share key",
        "description": "Joins an existing medkit using a share key",
        "operationId": "joinMedKitByKey",
        "requestBody": {
          "description": "Join request",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/JoinMedKitRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Successfully joined medkit",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/MedKitDTO"
                }
              }
            }
          },
          "404": {
            "description": "Share key expired or invalid"
          }
        }
      }
    },
    "/drug": {
      "post": {
        "tags": [
          "Drug Management"
        ],
        "summary": "Create a new drug",
        "description": "Creates a new drug in a medicine kit",
        "operationId": "createDrug",
        "requestBody": {
          "description": "Drug details to create",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/DrugCreateDTO"
              }
            }
          },
          "required": true
        },
        "responses": {
          "201": {
            "description": "Drug created successfully",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/DrugDTO"
                }
              }
            }
          },
          "400": {
            "description": "Invalid input"
          },
          "403": {
            "description": "User does not have access to the medicine kit"
          }
        }
      }
    },
    "/auth/register": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "Register a new user",
        "description": "Creates a new user and returns generated credentials.",
        "operationId": "register",
        "parameters": [
          {
            "name": "secret",
            "in": "query",
            "description": "Shared registration secret",
            "required": true,
            "schema": {
              "type": "string"
            }
        ],
        "responses": {
          "200": {
            "description": "User registered",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/RegisterResponse"
                }
              }
            }
          },
          "403": {
            "description": "Invalid registration secret"
          },
          "504": {
            "description": "Too many registration attempts"
          }
        }
      }
    },
    "/user": {
      "get": {
        "tags": [
          "User Data"
        ],
        "summary": "Get user snapshot",
        "description": "Returns user identifier with all accessible medkits and drugs for sync.",
        "operationId": "getAllDataForUser",
        "responses": {
          "200": {
            "description": "User snapshot retrieved",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/UserDto"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized"
          }
        }
      }
    },
    "/med-kit/{id}": {
      "get": {
        "tags": [
          "MedKit Management"
        ],
        "summary": "Get medkit by ID",
        "description": "Retrieves a medkit if the user has access",
        "operationId": "getMedKit",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Medkit ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Medkit found",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/MedKitDTO"
                }
              }
            }
          },
          "404": {
            "description": "Medkit not found or access denied"
          }
        }
      },
      "delete": {
        "tags": [
          "MedKit Management"
        ],
        "summary": "Delete medkit",
        "description": "Deletes a medkit or removes the user if others remain",
        "operationId": "deleteMedKit",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Medkit ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          },
          {
            "name": "transferToMedKitId",
            "in": "query",
            "description": "Target medkit ID to transfer drugs",
            "required": false,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "204": {
            "description": "Medkit deleted"
          },
          "404": {
            "description": "Medkit not found"
          }
        }
      }
    },
    "/drug/template/{id}": {
      "get": {
        "tags": [
          "Drug Management"
        ],
        "summary": "Get drug template by ID",
        "description": "Retrieves a drug template from the database",
        "operationId": "getDrugTemplate",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Template ID",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Template retrieved",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/DrugTemplateDTO"
                }
              }
            }
          },
          "404": {
            "description": "Template not found"
          }
        }
      }
    },
    "/drug/template/search": {
      "get": {
        "tags": [
          "Drug Management"
        ],
        "summary": "Search drug templates",
        "description": "Fuzzy search for drug templates in the database",
        "operationId": "searchDrugTemplates",
        "parameters": [
          {
            "name": "searchTerm",
            "in": "query",
            "description": "Search term",
            "required": true,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "limit",
            "in": "query",
            "description": "Maximum results",
            "required": false,
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 10
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Templates found",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/DrugTemplateDTO"
                }
              }
            }
          },
          "400": {
            "description": "Invalid search term"
          }
        }
      }
    },
